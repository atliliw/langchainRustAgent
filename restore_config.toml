max_tokens = 4000
keep_first_n_messages = 2
compress_threshold = 15
keep_recent_messages = 5
important_keywords = ["我的名字", "我是", "记住", "设定", "角色"]
summary_model = "qwen-plus"

[logging]
level = "info"
file_output = false
log_file = "logs/demo.log"
